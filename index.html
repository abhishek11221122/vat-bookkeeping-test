<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Benison Solvers — VAT Assessment</title>
    <link rel="icon" href="https://static.wixstatic.com/media/f09cc1_e90b119075904102bb78503477c3063d~mv2.png/v1/fill/w_203,h_54,al_c,q_95,usm_0.66_1.00_0.01,enc_avif,quality_auto/biglogo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ============================================================
           ROOT VARIABLES
           ============================================================ */
        :root {
            --navy: #0f1a2e;
            --navy-light: #1a2d4a;
            --navy-lighter: #2a4065;
            --gold: #c9a24b;
            --gold-light: #e0c67a;
            --gold-dark: #a8822f;
            --white: #ffffff;
            --off-white: #f8f7f4;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --success: #10b981;
            --success-light: #d1fae5;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ============================================================
           RESET & BASE
           ============================================================ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--off-white);
            color: var(--gray-800);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.6;
        }

        /* ============================================================
           UTILITY
           ============================================================ */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .text-gold {
            color: var(--gold);
        }
        .text-navy {
            color: var(--navy);
        }
        .text-muted {
            color: var(--gray-500);
        }
        .text-sm {
            font-size: 0.875rem;
        }
        .text-xs {
            font-size: 0.75rem;
        }
        .font-serif {
            font-family: 'Playfair Display', Georgia, serif;
        }
        .font-mono {
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
        }
        .fw-600 {
            font-weight: 600;
        }
        .fw-700 {
            font-weight: 700;
        }
        .tracking-wide {
            letter-spacing: 0.025em;
        }
        .tracking-wider {
            letter-spacing: 0.05em;
        }
        .tracking-widest {
            letter-spacing: 0.1em;
        }

        /* ============================================================
           ANIMATIONS
           ============================================================ */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease forwards;
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease forwards;
        }
        .animate-slide-down {
            animation: slideDown 0.3s ease forwards;
        }
        .animate-scale-in {
            animation: scaleIn 0.3s ease forwards;
        }

        /* ============================================================
           STATUS BAR
           ============================================================ */
        .statusbar {
            background: var(--navy);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--gold);
            box-shadow: var(--shadow);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--white);
            font-weight: 600;
            font-size: 18px;
            text-decoration: none;
        }

        .brand .logo-chip {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 4px 12px;
            display: flex;
            align-items: center;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand .logo-chip img {
            height: 32px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        .status-right {
            display: flex;
            align-items: center;
            gap: 16px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 500;
        }

        .status-right .phase {
            color: var(--white);
            font-weight: 600;
            background: rgba(255, 255, 255, 0.08);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            transition: var(--transition);
        }
        .badge .dot.safe {
            background: var(--success);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.4);
        }
        .badge .dot.warn {
            background: var(--danger);
            animation: pulse 1s infinite;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.4);
        }

        /* ============================================================
           STAGE
           ============================================================ */
        .stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 20px;
            min-height: calc(100vh - 76px);
        }

        /* ============================================================
           CARD
           ============================================================ */
        .card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 48px 48px 40px;
            max-width: 580px;
            width: 100%;
            box-shadow: var(--shadow-xl);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease forwards;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
        }

        .card .card-badge {
            display: inline-block;
            background: var(--gold);
            color: var(--white);
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 12px;
        }

        .card h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 32px;
            font-weight: 600;
            color: var(--navy);
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .card .sub {
            color: var(--gray-500);
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 28px;
        }

        .card .field {
            margin-bottom: 18px;
        }

        .card .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--gray-600);
            margin-bottom: 4px;
        }

        .card .field input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius);
            font-size: 15px;
            font-family: inherit;
            transition: var(--transition);
            background: var(--gray-50);
            color: var(--gray-800);
        }

        .card .field input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(201, 162, 75, 0.15);
            background: var(--white);
        }

        .card .field input:read-only {
            background: var(--gray-100);
            color: var(--gray-600);
            cursor: not-allowed;
        }

        .card .field input::placeholder {
            color: var(--gray-400);
        }

        /* ============================================================
           RULES
           ============================================================ */
        .rules {
            background: var(--gray-50);
            border-radius: var(--radius);
            padding: 18px 22px;
            margin: 22px 0 28px;
            border: 1px solid var(--gray-200);
        }

        .rules .rule-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 4px 0;
            font-size: 13.5px;
            color: var(--gray-700);
            line-height: 1.5;
        }

        .rules .rule-item .tick {
            color: var(--gold);
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* ============================================================
           BUTTONS
           ============================================================ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px 28px;
            border: none;
            border-radius: var(--radius);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--gold);
            color: var(--white);
            box-shadow: 0 4px 14px rgba(201, 162, 75, 0.35);
        }
        .btn-primary:hover {
            background: var(--gold-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(201, 162, 75, 0.4);
        }

        .btn-navy {
            background: var(--navy);
            color: var(--white);
            box-shadow: 0 4px 14px rgba(15, 26, 46, 0.3);
        }
        .btn-navy:hover {
            background: var(--navy-light);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(15, 26, 46, 0.35);
        }

        .btn-ghost {
            background: transparent;
            color: var(--gray-700);
            border: 2px solid var(--gray-200);
        }
        .btn-ghost:hover {
            background: var(--gray-50);
            border-color: var(--gray-300);
        }

        .btn-success {
            background: var(--success);
            color: var(--white);
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
        }
        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--danger);
            color: var(--white);
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.3);
        }
        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .btn-block {
            width: 100%;
            justify-content: center;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
            border-radius: 8px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ============================================================
           ERRORS
           ============================================================ */
        .err {
            color: var(--danger);
            font-size: 13px;
            margin-top: -6px;
            margin-bottom: 14px;
            display: none;
            background: var(--danger-light);
            padding: 8px 14px;
            border-radius: 8px;
            border-left: 4px solid var(--danger);
        }

        .err.show {
            display: block;
            animation: slideDown 0.3s ease forwards;
        }

        /* ============================================================
           FOOTNOTE
           ============================================================ */
        .footnote {
            font-size: 12px;
            color: var(--gray-400);
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--gray-200);
            line-height: 1.6;
            text-align: center;
        }

        /* ============================================================
           TEST SHELL
           ============================================================ */
        .test-shell {
            width: 100%;
            max-width: 820px;
            animation: fadeInUp 0.5s ease forwards;
        }

        .test-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .test-top .qcount {
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-500);
            letter-spacing: 0.02em;
        }

        .test-top .qcount span {
            color: var(--navy);
            font-weight: 700;
        }

        .timer {
            font-family: 'Inter', monospace;
            font-size: 20px;
            font-weight: 700;
            color: var(--navy);
            background: var(--white);
            padding: 8px 18px;
            border-radius: var(--radius);
            border: 2px solid var(--gray-200);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .timer .icon {
            font-size: 18px;
        }

        .timer.low {
            color: var(--danger);
            border-color: var(--danger);
            animation: pulse 1s infinite;
        }

        /* ============================================================
           PROGRESS BAR
           ============================================================ */
        .progress-wrap {
            width: 100%;
            height: 6px;
            background: var(--gray-200);
            border-radius: 4px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
            border-radius: 4px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }

        /* ============================================================
           QUESTION CARD
           ============================================================ */
        .qcard {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 36px 40px 32px;
            box-shadow: var(--shadow-xl);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .qcard::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .qcard .qnum {
            font-size: 12px;
            font-weight: 600;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .qcard .qtext {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 22px;
            line-height: 1.5;
            color: var(--navy);
            margin-bottom: 24px;
            font-weight: 500;
        }

        /* ============================================================
           OPTIONS
           ============================================================ */
        .opt {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius);
            margin-bottom: 10px;
            cursor: pointer;
            transition: var(--transition);
            background: var(--white);
        }

        .opt:hover {
            border-color: var(--gold);
            background: rgba(201, 162, 75, 0.04);
            transform: translateX(4px);
        }

        .opt.selected {
            border-color: var(--gold);
            background: rgba(201, 162, 75, 0.08);
            box-shadow: 0 0 0 4px rgba(201, 162, 75, 0.1);
        }

        .opt .letter {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
            color: var(--gray-500);
            transition: var(--transition);
        }

        .opt.selected .letter {
            background: var(--gold);
            border-color: var(--gold);
            color: var(--white);
        }

        .opt .opt-text {
            font-size: 15px;
            color: var(--gray-700);
        }

        /* ============================================================
           REVIEW PANEL
           ============================================================ */
        .review-panel {
            background: var(--gray-50);
            border-radius: var(--radius);
            padding: 12px 16px;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid var(--gray-200);
        }

        .review-panel label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-700);
            cursor: pointer;
        }

        .review-panel input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--gold);
            cursor: pointer;
        }

        .review-panel .stats {
            font-size: 12px;
            color: var(--gray-500);
            font-weight: 500;
        }

        /* ============================================================
           NAV ROW
           ============================================================ */
        .nav-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .dots {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .navdot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--gray-200);
            cursor: pointer;
            transition: var(--transition);
            border: none;
            padding: 0;
        }

        .navdot:hover {
            transform: scale(1.2);
        }

        .navdot.answered {
            background: var(--gold);
        }

        .navdot.current {
            outline: 3px solid rgba(201, 162, 75, 0.4);
            outline-offset: 2px;
            transform: scale(1.15);
        }

        .navdot.review {
            background: var(--warning);
        }

        .nav-row .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* ============================================================
           OVERLAY
           ============================================================ */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 26, 46, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .overlay.show {
            display: flex;
        }

        .warncard {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 40px 38px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            border-top: 4px solid var(--danger);
            animation: scaleIn 0.3s ease forwards;
            box-shadow: var(--shadow-2xl);
        }

        .warncard .icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
        }

        .warncard h2 {
            font-family: 'Playfair Display', Georgia, serif;
            color: var(--danger);
            font-size: 22px;
            margin-bottom: 8px;
        }

        .warncard p {
            color: var(--gray-500);
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .warncard .strike-count {
            font-size: 14px;
            font-weight: 600;
            color: var(--danger);
            margin-bottom: 16px;
        }

        /* ============================================================
           RESULTS
           ============================================================ */
        .score-hero {
            text-align: center;
            padding: 20px 0 12px;
        }

        .score-num {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 72px;
            font-weight: 700;
            line-height: 1;
            color: var(--navy);
        }

        .score-num.pass {
            color: var(--success);
        }
        .score-num.fail {
            color: var(--danger);
        }

        .score-label {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--gray-500);
            margin-top: 6px;
        }

        .score-label .badge-pass {
            background: var(--success-light);
            color: #065f46;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 12px;
        }

        .score-label .badge-fail {
            background: var(--danger-light);
            color: #991b1b;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* ============================================================
           CERTIFICATE
           ============================================================ */
        .certificate {
            background: linear-gradient(135deg, #fdfcf7 0%, #f8f5ec 100%);
            border: 3px double var(--gold);
            padding: 40px 32px;
            margin: 24px 0;
            text-align: center;
            border-radius: var(--radius);
            position: relative;
            box-shadow: var(--shadow-lg);
        }

        .certificate::before {
            content: '✦';
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);

<body>

    <div id="app">

            <p id="confirmUnanswered" style="font-size:13px;color:var(--gray-500);"></p>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ============================================================
        // TOAST SYSTEM
        // ============================================================
        function showToast(message, type) {
            type = type || 'info';
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast ' + type;
            var icons = {
                success: '✅',
                error: '❌',
                info: 'ℹ️',
                warning: '⚠️'
            };
            toast.innerHTML = '<span class="toast-icon">' + (icons[type] || 'ℹ️') + '</span> ' + message;
            container.appendChild(toast);
            setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(function() { toast.remove(); }, 300);
            }, 4000);
        }

        // ============================================================
        // SUPABASE CONFIG
        // ============================================================
        var SUPABASE_URL = "https://rbcjfecerhonpyyoxrre.supabase.co";
        var SUPABASE_ANON_KEY = "sb_publishable_q-7geKIhAgKh8aiGPL9vLA_ZSGC7xeO";

        // ============================================================
        // STATE
        // ============================================================
        var BANK = [];
        var PASS_THRESHOLD = 50;
        var MAX_STRIKES = 3;
        var TEST_SECONDS = 480;
        var inviteToken = null;
        var tokenValid = false;
        var tokenUsed = false;

        var candidate = {};
        var violations = [];
        var strikes = 0;
        var timerInterval = null;
        var secondsLeft = 480;
        var current = 0;
        var answers = {};
        var locked = false;
        var inTest = false;
        var reviewFlags = {};
        var startTime = null;
        var shuffledBank = [];
        var resultsData = null;
        var hasMultipleMonitors = false;
        var focusLossCount = 0;
        var MAX_FOCUS_LOSS = 5;

        var stage = document.getElementById('stage');
        var phaseLabel = document.getElementById('phaseLabel');
        var overlay = document.getElementById('overlay');
        var confirmOverlay = document.getElementById('confirmOverlay');
        var warnTitle = document.getElementById('warnTitle');
        var warnBody = document.getElementById('warnBody');
        var strikeCountEl = document.getElementById('strikeCount');
        var resumeBtn = document.getElementById('resumeBtn');
        var integrityDot = document.getElementById('integrityDot');
        var integrityText = document.getElementById('integrityText');

        // ============================================================
        // FALLBACK QUESTIONS
        // ============================================================
        var FALLBACK_BANK = [
            { q: "What is the current UK standard rate of VAT?", opts: ["17.5%", "20%", "5%", "25%"], correct: 1 },
            { q: "As of 2026, what is the VAT registration threshold for UK taxable turnover?", opts: ["£85,000", "£90,000",
                    "£100,000", "There is no threshold"
                ], correct: 1 },
            { q: "Over what period is the VAT registration threshold assessed?", opts: [
                    "The current tax year only", "A rolling 12-month period",
                    "A single calendar month", "A 3-year average"
                ], correct: 1 },
            { q: "A business sells children's clothing in the UK. How is this typically treated for VAT?", opts: [
                    "Standard-rated (20%)", "Reduced-rated (5%)", "Zero-rated (0%)", "Exempt"
                ], correct: 2 },
            { q: "What is the key bookkeeping difference between a zero-rated and an exempt supply?", opts: [
                    "There is no difference",
                    "Zero-rated sales are VAT-taxable at 0% so input VAT can still be reclaimed; exempt supplies fall outside VAT entirely and input VAT can't be reclaimed",
                    "Exempt supplies still appear on the VAT return; zero-rated ones don't",
                    "Only exempt supplies count toward the registration threshold"
                ], correct: 1 },
            { q: "On a standard UK VAT return, what does Box 1 represent?", opts: ["VAT reclaimed on purchases",
                    "Total value of sales excluding VAT", "VAT due on sales and outputs",
                    "Total value of purchases excluding VAT"
                ], correct: 2 },
            { q: "Under Making Tax Digital (MTD) for VAT, what is a core bookkeeping requirement?", opts: [
                    "Records may be kept on paper as long as totals are accurate",
                    "VAT records must be kept digitally and submitted via compatible software",
                    "Only businesses over £1 million turnover need digital records",
                    "MTD only applies to the annual VAT return, not quarterly ones"
                ], correct: 1 },
            { q: "A UK VAT-registered business receives an invoice from an overseas supplier subject to the reverse charge. What does the bookkeeper do?",
                opts: [
                    "Ignore it since no UK VAT was charged",
                    "Account for output VAT and input VAT on the same return, as if the business supplied the service to itself",
                    "Ask the supplier to reissue the invoice with UK VAT added",
                    "Record it as an exempt purchase"
                ], correct: 1 },
            { q: "A sole trader's VAT-inclusive sale is £120. What is the VAT element at the standard rate?", opts: [
                    "£24", "£20", "£12", "£100"
                ], correct: 1 },
            { q: "What happens if a business's taxable turnover falls below the deregistration threshold?", opts: [
                    "VAT registration is cancelled automatically with no application needed",
                    "The business may apply to HMRC to deregister",
                    "Nothing changes; deregistration isn't possible",
                    "The standard rate drops to the reduced rate"
                ], correct: 1 },
        ];

        // ============================================================
        // SUPABASE HELPERS
        // ============================================================
        function supabaseFetch(path, options) {
            options = options || {};
            var url = SUPABASE_URL + '/rest/v1/' + path;
            var headers = {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
                'Content-Type': 'application/json'
            };
            return fetch(url, {
                method: options.method || 'GET',
                headers: headers,
                body: options.body || null
            }).then(function(response) {
                if (!response.ok) {
                    return response.text().then(function(text) {
                        throw new Error('HTTP ' + response.status + ': ' + text);
                    });
                }
                var contentType = response.headers.get('content-type') || '';
                if (contentType.indexOf('application/json') === -1) {
                    return [];
                }
                return response.json().catch(function() {
                    return [];
                });
            });
        }

        // ============================================================
        // TOKEN VALIDATION
        // ============================================================
        function validateToken(token) {
            return supabaseFetch('invites?token=eq.' + token + '&used=eq.false').then(function(data) {
                if (data && data.length > 0) {
                    tokenValid = true;
                    tokenUsed = false;
                    return data[0];
                }
                return supabaseFetch('invites?token=eq.' + token + '&used=eq.true').then(function(usedData) {
                    if (usedData && usedData.length > 0) {
                        tokenValid = false;
                        tokenUsed = true;
                        return null;
                    }
                    tokenValid = false;
                    tokenUsed = false;
                    return null;
                });
            });
        }

        function markTokenUsed(token) {
            return supabaseFetch('invites?token=eq.' + token, {
                method: 'PATCH',
                body: JSON.stringify({ used: true })
            });
        }

        // ============================================================
        // LOAD SETTINGS & QUESTIONS
        // ============================================================
        function loadSettingsFromSupabase() {
            return supabaseFetch('assessment_settings?limit=1').then(function(data) {
                if (data && data.length > 0) {
                    PASS_THRESHOLD = data[0].pass_threshold || 50;
                    TEST_SECONDS = data[0].test_duration_seconds || 480;
                    MAX_STRIKES = data[0].max_violations || 3;
                    secondsLeft = TEST_SECONDS;
                }
            }).catch(function(e) {
                console.error('Error loading settings:', e);
            });
        }

        function loadQuestionsFromSupabase() {
            return supabaseFetch('questions?order=id.asc').then(function(data) {
                if (data && data.length > 0) {
                    BANK = data.map(function(q) {
                        return {
                            q: q.question || q.q || '',
                            opts: q.options || q.opts || ['', '', '', ''],
                            correct: q.correct_index || q.correct || 0
                        };
                    });
                    console.log('✅ Loaded ' + BANK.length + ' questions from Supabase');
                    return true;
                }
                return false;
            }).catch(function(e) {
                console.error('Error loading questions from Supabase:', e);
                return false;
            });
        }

        // ============================================================
        // SAVE RESULT
        // ============================================================
        function saveResultToSupabase(payload) {
            return supabaseFetch('candidates', {
                method: 'POST',
                body: JSON.stringify(payload)
            }).then(function() {
                console.log('✅ Result saved to Supabase');
            }).catch(function(e) {
                console.error('Error saving result:', e);
            });
        }

        // ============================================================
        // CORE FUNCTIONS
        // ============================================================
        function seededShuffle(arr, seed) {
            var a = arr.slice();
            var s = seed;
            for (var i = a.length - 1; i > 0; i--) {
                s = (s * 9301 + 49297) % 233280;
                var j = Math.floor((s / 233280) * (i + 1));
                var temp = a[i];
                a[i] = a[j];
                a[j] = temp;
            }
            return a;
        }

        function buildShuffledBank(seed) {
            var qOrder = seededShuffle(BANK.map(function(_, i) { return i; }), seed);
            return qOrder.map(function(idx, qi) {
                var orig = BANK[idx];
                var optOrder = seededShuffle(orig.opts.map(function(_, i) { return i; }), seed + qi * 7 + 3);
                var opts = optOrder.map(function(i) { return orig.opts[i]; });
                var correct = optOrder.indexOf(orig.correct);
                return {
                    q: orig.q,
                    opts: opts,
                    correct: correct,
                    originalIndex: idx
                };
            });
        }

        function logViolation(type, label) {
            violations.push({ type: type, label: label, time: new Date().toISOString() });
            strikes++;
            integrityDot.className = 'dot warn';
            integrityText.textContent = strikes + ' violation' + (strikes > 1 ? 's' : '');
            return strikes;
        }

        function fmtTime(d) {
            var date = typeof d === 'string' ? new Date(d) : d;
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function fmtClock(sec) {
            var m = Math.floor(sec / 60).toString().padStart(2, '0');
            var s = (sec % 60).toString().padStart(2, '0');
            return m + ':' + s;
        }

        function getAnsweredCount() {
            var count = 0;
            for (var key in answers) {
                if (answers[key] !== undefined) count++;
            }
            return count;
        }

        function getReviewCount() {
            var count = 0;
            for (var key in reviewFlags) {
                if (reviewFlags[key]) count++;
            }
            return count;
        }

        // ============================================================
        // ANTI-CHEATING
        // ============================================================
        function detectMultipleMonitors() {
            var screenWidth = window.screen.width;
            var availWidth = window.screen.availWidth;
            if (screenWidth > 1920 || Math.abs(availWidth - screenWidth) > 100) {
                return true;
            }
            if (window.screen.isExtended !== undefined && window.screen.isExtended) {
                return true;
            }
            return false;
        }

        window.addEventListener('blur', function() {
            if (!inTest || locked) return;
            focusLossCount++;
            logViolation('focus-loss', 'Window lost focus (' + focusLossCount + ')');
            if (focusLossCount >= MAX_FOCUS_LOSS) {
                showViolation('excessive-focus-loss', 'Multiple focus changes', '⚠️ Focus Lost Multiple Times',
                    'Please keep the test window in focus.');
            }
        });

        document.addEventListener('keydown', function(e) {
            if (!inTest || locked) return;
            var k = e.key.toLowerCase();
            var blockedCombo = (e.ctrlKey || e.metaKey) && ['c', 'v', 'x', 'a', 'u', 's', 'p', 'r', 't'].indexOf(k) !== -1;
            var devtools = k === 'f12' || ((e.ctrlKey || e.metaKey) && e.shiftKey && ['i', 'j', 'c'].indexOf(k) !== -1);
            if (blockedCombo || devtools) {
                e.preventDefault();
                logViolation('shortcut', 'Blocked shortcut (' + ((e.ctrlKey ? 'Ctrl+' : '')) + e.key.toUpperCase() +
                ')');
            }
        });

        document.addEventListener('contextmenu', function(e) { if (inTest) e.preventDefault(); });
        document.addEventListener('copy', function(e) { if (inTest) e.preventDefault(); });
        document.addEventListener('paste', function(e) { if (inTest) e.preventDefault(); });

        document.addEventListener('fullscreenchange', function() {
            if (inTest && !document.fullscreenElement && !locked) {
                showViolation('fullscreen', 'Fullscreen mode exited', 'Fullscreen exited',
                    'Please stay in fullscreen for the duration of the test.');
            }
        });

        document.addEventListener('visibilitychange', function() {
            if (inTest && document.hidden && !locked) {
                showViolation('tabswitch', 'Switched tab or window', 'Window left focus',
                    'Switching tabs or windows during the test is logged as a violation.');
            }
        });

        // ============================================================
        // SHOW TOKEN BLOCKED
        // ============================================================
        function showTokenBlocked(message) {
            phaseLabel.textContent = 'Access Denied';
            stage.innerHTML = `
                <div class="card" style="max-width:500px;">
                    <div class="token-blocked">
                        <span class="icon">🚫</span>
                        <h2>Access Denied</h2>
                        <p>${message}</p>
                        <p style="margin-top:16px;font-size:13px;color:var(--gray-400);">
                            This link is one-time use only. If you have already completed the assessment, 
                            please contact the administrator for any questions.
                        </p>
                        <div style="margin-top:24px;">
                            <button class="btn btn-primary" onclick="window.location.href='/'">Go to Home</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // ============================================================
        // REGISTRATION
        // ============================================================
        function renderRegistration() {
            phaseLabel.textContent = 'Registration';
            var params = new URLSearchParams(window.location.search);
            var inviteName = params.get('name') ? decodeURIComponent(params.get('name')) : '';
            var inviteEmail = params.get('email') ? decodeURIComponent(params.get('email')) : '';
            inviteToken = params.get('token') || '';

            if (inviteToken) {
                stage.innerHTML = `
                    <div class="card" style="max-width:500px;text-align:center;padding:60px 40px;">
                        <div style="font-size:48px;margin-bottom:16px;">⏳</div>
                        <h2 style="font-family:'Playfair Display',Georgia,serif;">Validating your link...</h2>
                        <p style="color:var(--gray-500);">Please wait while we verify your access.</p>
                        <div style="margin-top:24px;">
                            <div class="progress-wrap" style="max-width:200px;margin:0 auto;">
                                <div class="progress-bar" style="width:100%;animation:pulse 1.5s infinite;"></div>
                            </div>
                        </div>
                    </div>
                `;

                validateToken(inviteToken).then(function(inviteData) {
                    if (tokenUsed) {
                        showTokenBlocked('❌ This link has already been used. Each link can only be used once.');
                        return;
                    }
                    if (!tokenValid) {
                        showTokenBlocked('❌ Invalid or expired link. Please contact the administrator.');
                        return;
                    }
                    sessionStorage.setItem('benison_token', inviteToken);
                    showRegistrationForm(inviteName, inviteEmail, inviteData);
                }).catch(function(e) {
                    console.error('Token validation error:', e);
                    showTokenBlocked('⚠️ Error validating your link. Please contact the administrator.');
                });
            } else {
                showRegistrationForm('', '', null);
            }
        }

        function showRegistrationForm(inviteName, inviteEmail, inviteData) {
            var isInvited = !!(inviteName && inviteEmail && inviteToken && tokenValid);

            stage.innerHTML = `
                <div class="card">
                    <span class="card-badge">${isInvited ? '🎯 Invited Assessment' : '📝 Assessment Access'}</span>
                    <h1>${isInvited ? 'Welcome, ' + inviteName.split(' ')[0] : 'Before you begin'}</h1>
                    <p class="sub">${isInvited
                        ? 'You\'ve been invited by Benison Solvers to complete this VAT bookkeeping assessment. Confirm your details below to begin — this is a one-time attempt.'
                        : 'This is a short VAT bookkeeping assessment for Benison Solvers. Enter your details to start — this is a one-time attempt tied to your registration.'}</p>

                    <div class="field">
                        <label>Full name</label>
                        <input type="text" id="regName" placeholder="Jordan Smith" value="${inviteName}" ${isInvited ? 'readonly' : ''}>
                    </div>
                    <div class="field">
                        <label>Email</label>
                        <input type="email" id="regEmail" placeholder="jordan@email.com" value="${inviteEmail}" ${isInvited ? 'readonly' : ''}>
                    </div>
                    <div class="field">
                        <label>Phone</label>
                        <input type="tel" id="regPhone" placeholder="+1 555 000 0000" required>
                    </div>
                    <div class="field">
                        <label>Position applied for</label>
                        <input type="text" id="regRole" placeholder="Bookkeeper — UK VAT" value="Bookkeeper — UK VAT">
                    </div>
                    <div class="err" id="regErr">Please fill in all fields to continue.</div>

                    <div class="rules">
                        <div class="rule-item"><span class="tick">✓</span> The test runs in fullscreen. Exiting fullscreen or switching tabs is logged.</div>
                        <div class="rule-item"><span class="tick">✓</span> Copy, paste, and right-click are disabled during the test.</div>
                        <div class="rule-item"><span class="tick">✓</span> ${MAX_STRIKES} logged violations will auto-submit your test.</div>
                        <div class="rule-item"><span class="tick">✓</span> You have ${Math.floor(TEST_SECONDS/60)} minutes once you start.</div>
                        <div class="rule-item"><span class="tick">✓</span> Passing score: ${PASS_THRESHOLD}% — certificate awarded on passing.</div>
                        <div class="rule-item"><span class="tick">✓</span> <strong>One-time link:</strong> This link cannot be used again after submission.</div>
                    </div>

                    <button class="btn btn-primary btn-block" id="startBtn">🚀 Register &amp; enter fullscreen</button>

                    <div class="footnote">Benison Solvers · Chartered Certified Accountants, Brentford, West London · Established since 2008 · 1000 Great West Road, Brentford, London, TW8 9DW · 020 3657 5631</div>
                </div>
            `;

            document.getElementById('startBtn').onclick = function() {
                var name = document.getElementById('regName').value.trim();
                var email = document.getElementById('regEmail').value.trim();
                var phone = document.getElementById('regPhone').value.trim();
                var role = document.getElementById('regRole').value.trim();
                var err = document.getElementById('regErr');
                if (!name || !email || !phone || !role) {
                    err.className = 'err show';
                    return;
                }
                err.className = 'err';
                candidate = { name: name, email: email, phone: phone, role: role };

                if (inviteToken) {
                    validateToken(inviteToken).then(function(data) {
                        if (tokenUsed) {
                            showTokenBlocked('❌ This link has already been used. Each link can only be used once.');
                            return;
                        }
                        if (!tokenValid) {
                            showTokenBlocked('❌ Invalid or expired link. Please contact the administrator.');
                            return;
                        }
                        startAssessment();
                    }).catch(function(e) {
                        showTokenBlocked('⚠️ Error validating your link. Please contact the administrator.');
                    });
                } else {
                    startAssessment();
                }
            };
        }

        function startAssessment() {
            if (detectMultipleMonitors()) {
                hasMultipleMonitors = true;
                logViolation('multi-monitor', 'Multiple monitors detected');
            }

            var seed = 0;
            for (var i = 0; i < candidate.name.length; i++) {
                seed += candidate.name.charCodeAt(i);
            }
            for (var j = 0; j < candidate.email.length; j++) {
                seed += candidate.email.charCodeAt(j);
            }
            seed = seed + Date.now() % 1000;
            shuffledBank = buildShuffledBank(seed);

            if (inviteToken && tokenValid) {
                markTokenUsed(inviteToken).catch(function(e) {
                    console.error('Error marking token as used:', e);
                });
            }

            enterFullscreenAndStart();
        }

        function enterFullscreenAndStart() {
            var el = document.documentElement;
            var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
            if (req) {
                req.call(el).then(startTest).catch(function() { startTest(); });
            } else {
                startTest();
            }
        }

        // ============================================================
        // TEST
        // ============================================================
        function startTest() {
            inTest = true;
            startTime = Date.now();
            phaseLabel.textContent = 'In progress';
            secondsLeft = TEST_SECONDS;
            timerInterval = setInterval(tick, 1000);
            renderQuestion();
        }

        function tick() {
            secondsLeft--;
            var timerEl = document.getElementById('timerDisplay');
            if (timerEl) {
                timerEl.innerHTML = '<span class="icon">⏱️</span> ' + fmtClock(secondsLeft);
                timerEl.className = 'timer' + (secondsLeft <= 30 ? ' low' : '');
            }
            if (secondsLeft <= 0) {
                clearInterval(timerInterval);
                finishTest('time');
            }
        }

        function renderQuestion() {
            var item = shuffledBank[current];
            var answered = answers[current] !== undefined;
            var flagged = reviewFlags[current] || false;
            var total = shuffledBank.length;
            var answeredCount = getAnsweredCount();
            var reviewCount = getReviewCount();

            stage.innerHTML = `
                <div class="test-shell">
                    <div class="test-top">
                        <span class="qcount">Question <span>${current+1}</span> of ${total} · ${candidate.role || ''}</span>
                        <div class="timer" id="timerDisplay"><span class="icon">⏱️</span> ${fmtClock(secondsLeft)}</div>
                    </div>
                    <div class="progress-wrap">
                        <div class="progress-bar" style="width:${((current+1)/total)*100}%"></div>
                    </div>
                    <div class="qcard">
                        <div class="qnum">Q${current+1} ${flagged ? '⚑ Flagged' : ''}</div>
                        <p class="qtext">${item.q}</p>
                        <div id="optsWrap">
                            ${item.opts.map(function(o, i) {
                                return '<div class="opt ' + (answered && answers[current]===i ? 'selected' : '') + '" data-i="' + i + '">' +
                                    '<span class="letter">' + String.fromCharCode(65+i) + '</span>' +
                                    '<span class="opt-text">' + o + '</span>' +
                                    '</div>';
                            }).join('')}
                        </div>

                        <div class="review-panel">
                            <label>
                                <input type="checkbox" id="flagCheck" ${flagged ? 'checked' : ''}>
                                Flag for review
                            </label>
                            <span class="stats">${answeredCount}/${total} answered · ${reviewCount} flagged</span>
                        </div>

                        <div class="nav-row">
                            <div class="dots">
                                ${shuffledBank.map(function(_, i) {
                                    return '<span class="navdot ' + (answers[i]!==undefined ? 'answered' : '') + (i===current ? ' current' : '') + (reviewFlags[i] ? ' review' : '') + '" data-goto="' + i + '" title="' + (i+1) + (answers[i]!==undefined ? ' ✓' : '') + (reviewFlags[i] ? ' ⚑' : '') + '"></span>';
                                }).join('')}
                            </div>
                            <div class="actions">
                                ${current > 0 ? '<button class="btn btn-ghost btn-sm" id="prevBtn">← Back</button>' : ''}
                                ${current < shuffledBank.length-1 
                                    ? '<button class="btn btn-ghost btn-sm" id="nextBtn">Next →</button>'
                                    : '<button class="btn btn-primary btn-sm" id="submitBtn">📤 Submit</button>'}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.querySelectorAll('.opt').forEach(function(el) {
                el.onclick = function() {
                    answers[current] = parseInt(el.dataset.i, 10);
                    renderQuestion();
                };
            });

            var flagEl = document.getElementById('flagCheck');
            if (flagEl) {
                flagEl.onchange = function() {
                    if (flagEl.checked) {
                        reviewFlags[current] = true;
                    } else {
                        delete reviewFlags[current];
                    }
                    renderQuestion();
                };
            }

            document.querySelectorAll('.navdot').forEach(function(el) {
                el.onclick = function() {
                    current = parseInt(el.dataset.goto, 10);
                    renderQuestion();
                };
            });

            var prevBtn = document.getElementById('prevBtn');
            if (prevBtn) prevBtn.onclick = function() { current--;
                renderQuestion(); };

            var nextBtn = document.getElementById('nextBtn');
            if (nextBtn) nextBtn.onclick = function() { current++;
                renderQuestion(); };

            var submitBtn = document.getElementById('submitBtn');
            if (submitBtn) submitBtn.onclick = function() { showConfirmDialog(); };
        }

        function showConfirmDialog() {
            var total = shuffledBank.length;
            var answered = getAnsweredCount();
            var unanswered = total - answered;
            document.getElementById('confirmAnswered').textContent = answered;
            document.getElementById('confirmTotal').textContent = total;
            document.getElementById('confirmUnanswered').textContent = unanswered > 0 ?
                unanswered + ' question' + (unanswered > 1 ? 's' : '') + ' unanswered.' :
                '🎉 All questions answered!';
            confirmOverlay.className = 'overlay show';
        }

        document.getElementById('confirmCancel').onclick = function() {
            confirmOverlay.className = 'overlay';
        };

        document.getElementById('confirmSubmit').onclick = function() {
            confirmOverlay.className = 'overlay';
            finishTest('manual');
        };

        // ============================================================
        // FINISH TEST
        // ============================================================
        function finishTest(reason) {
            inTest = false;
            clearInterval(timerInterval);
            locked = true;
            if (document.fullscreenElement) document.exitFullscreen && document.exitFullscreen();

            var correct = 0;
            var detailedResults = shuffledBank.map(function(item, i) {
                var userAnswer = answers[i];
                var isCorrect = userAnswer !== undefined && userAnswer === item.correct;
                if (isCorrect) correct++;
                return {
                    question: item.q,
                    options: item.opts,
                    correctIndex: item.correct,
                    userAnswer: userAnswer,
                    isCorrect: isCorrect,
                    answered: userAnswer !== undefined
                };
            });

            var total = shuffledBank.length;
            var pct = Math.round((correct / total) * 100);
            var passed = pct >= PASS_THRESHOLD;

            resultsData = {
                correct: correct,
                total: total,
                pct: pct,
                passed: passed,
                detailedResults: detailedResults,
                reason: reason,
                violations: violations,
                reviewFlags: Object.keys(reviewFlags).length,
                timeTaken: Math.floor((Date.now() - startTime) / 1000),
                hasMultipleMonitors: hasMultipleMonitors
            };

            var answersJson = JSON.stringify(detailedResults.map(function(r) {
                return {
                    question: r.question,
                    userAnswer: r.userAnswer !== undefined ? r.options[r.userAnswer] : null,
                    correctAnswer: r.options[r.correctIndex],
                    isCorrect: r.isCorrect
                };
            }));

            var payload = {
                name: candidate.name,
                email: candidate.email,
                phone: candidate.phone,
                role: candidate.role,
                score_percent: pct,
                correct: correct,
                total: total,
                passed: passed,
                violation_count: violations.length,
                violation_log: violations.map(function(v) { return v.label + ' @ ' + fmtTime(v.time); }).join(" | ") ||
                    "None",
                submission_reason: reason,
                time_taken_seconds: resultsData.timeTaken,
                review_flags: Object.keys(reviewFlags).length,
                multi_monitor_detected: hasMultipleMonitors,
                detailed_answers: answersJson
            };

            saveResultToSupabase(payload);

            if (inviteToken && tokenValid) {
                markTokenUsed(inviteToken).catch(function(e) {
                    console.error('Error marking token as used (final):', e);
                });
            }

            phaseLabel.textContent = 'Complete';
            renderResults();
        }

        function renderResults() {
            var correct = resultsData.correct;
            var total = resultsData.total;
            var pct = resultsData.pct;
            var passed = resultsData.passed;
            var detailedResults = resultsData.detailedResults;
            var reason = resultsData.reason;
            var timeTaken = resultsData.timeTaken;

            var reviewItems = detailedResults.map(function(item, idx) {
                var userAns = item.userAnswer !== undefined ? item.options[item.userAnswer] : 'Not answered';
                var correctAns = item.options[item.correctIndex];
                var isCorrect = item.isCorrect;
                var statusClass = isCorrect ? 'correct' : 'wrong';
                var statusIcon = isCorrect ? '✅' : '❌';

                return '<div class="review-item ' + statusClass + '">' +
                    '<div class="r-q">' + statusIcon + ' Q' + (idx + 1) + ': ' + item.question + '</div>' +
                    '<div class="r-answers">' +
                    (item.answered ?
                        'Your answer: <span class="' + (isCorrect ? 'correct-answer' : 'wrong-answer') + '">' +
                        userAns + '</span>' :
                        'Not answered') +
                    (!isCorrect && item.answered ? ' · Correct answer: <span class="correct-answer">' + correctAns +
                        '</span>' : '') +
                    (!item.answered ? ' · Correct answer: <span class="correct-answer">' + correctAns + '</span>' :
                        '') +
                    '</div></div>';
            }).join('');

            var certificateHTML = passed ?
                `
                    <div class="certificate">
                        <img src="https://static.wixstatic.com/media/f09cc1_e90b119075904102bb78503477c3063d~mv2.png/v1/fill/w_532,h_141,al_c,lg_1,q_95,enc_avif,quality_auto/biglogo.png" alt="Benison Solvers" class="cert-logo">
                        <span class="cert-badge">🏆</span>
                        <h2>CERTIFICATE OF COMPLETION</h2>
                        <div class="cert-sub">VAT Bookkeeping Assessment</div>
                        <div class="cert-name">${candidate.name}</div>
                        <div class="cert-detail">
                            Has successfully completed the Benison Solvers VAT Bookkeeping Assessment<br>
                            with a score of <strong>${pct}%</strong>
                        </div>
                        <div class="cert-score">${correct}/${total} correct answers</div>
                        <div class="established">Established since 2008 · Chartered Certified Accountants, Brentford, West London</div>
                        <div class="cert-footer">
                            <span>📅 ${new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })}</span>
                            <span>Benison Solvers · Chartered Certified Accountants</span>
                            <span>Cert ID: BS-VAT-${String(Date.now()).slice(-6)}</span>
                        </div>
                    </div>
                ` :
                `
                    <div class="certificate fail">
                        <img src="https://static.wixstatic.com/media/f09cc1_e90b119075904102bb78503477c3063d~mv2.png/v1/fill/w_532,h_141,al_c,lg_1,q_95,enc_avif,quality_auto/biglogo.png" alt="Benison Solvers" class="cert-logo">
                        <span class="cert-badge">📋</span>
                        <h2 style="color:var(--danger);">Assessment Completed</h2>
                        <div class="cert-sub">VAT Bookkeeping Assessment — Result</div>
                        <div class="cert-name">${candidate.name}</div>
                        <div class="cert-detail" style="color:var(--danger);font-weight:600;">
                            Score: ${pct}% — Below passing threshold (${PASS_THRESHOLD}%)
                        </div>
                        <div class="cert-score">${correct}/${total} correct answers</div>
                        <div class="established">Established since 2008 · Chartered Certified Accountants, Brentford, West London</div>
                        <div class="cert-footer">
                            <span>📅 ${new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })}</span>
                            <span>Benison Solvers · Chartered Certified Accountants</span>
                        </div>
                    </div>
                `;

            stage.innerHTML = `
                <div class="card" style="max-width: 720px;">
                    <span class="card-badge">${passed ? '🎉 Assessment Passed' : '📋 Assessment Complete'}</span>
                    <h1>${candidate.name}, ${passed ? 'congratulations!' : 'thank you for completing it.'}</h1>
                    <p class="sub">${reason==='time' ? '⏱️ Time expired — your answers were submitted automatically.' : (reason==='strikes' ? '⚠️ Auto-submitted after repeated integrity violations.' : '📤 Submitted for review.')}</p>

                    <div class="score-hero">
                        <div class="score-num ${passed ? 'pass' : 'fail'}">${pct}%</div>
                        <div class="score-label">
                            ${correct} of ${total} correct — 
                            <span class="${passed ? 'badge-pass' : 'badge-fail'}">${passed ? '✅ PASSED' : '❌ NOT PASSED'}</span>
                        </div>
                    </div>

                    ${certificateHTML}

                    <div class="no-print" style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin: 12px 0;">
                        <button class="btn ${passed ? 'btn-success' : 'btn-ghost'}" onclick="window.print()">🖨️ Print Certificate</button>
                        <button class="btn btn-ghost" id="toggleReviewBtn">📝 Hide Full Answer Review</button>
                    </div>

                    <div class="answer-review" id="answerReview">
                        <h3>📝 Full Answer Review</h3>
                        ${reviewItems}
                    </div>

                    <div class="log no-print">
                        <div class="log-title">🔒 Integrity Log</div>
                        ${violations.length === 0
                            ? '<div class="log-empty">✅ No violations recorded — clean session.</div>'
                            : violations.map(function(v) {
                                return '<div class="log-row"><span>' + v.label + '</span><span class="log-time">' + fmtTime(v.time) + '</span></div>';
                            }).join('')}
                        <div class="log-row">
                            <span>⏱️ Time taken</span>
                            <span class="log-time">${fmtClock(timeTaken)}</span>
                        </div>
                        <div class="log-row">
                            <span>⚑ Questions flagged</span>
                            <span class="log-time">${Object.keys(reviewFlags).length}</span>
                        </div>
                        ${hasMultipleMonitors ? `
                        <div class="log-row" style="color:var(--danger);">
                            <span>🖥️ Multiple monitors detected</span>
                            <span class="log-time">⚠️ Flagged</span>
                        </div>
                        ` : ''}
                    </div>

                    <div class="footnote no-print">Benison Solvers · Chartered Certified Accountants, Brentford, West London · Established since 2008 · 1000 Great West Road, Brentford, London, TW8 9DW · 020 3657 5631</div>
                </div>
            `;

            var reviewVisible = true;
            var toggleBtn = document.getElementById('toggleReviewBtn');
            var reviewEl = document.getElementById('answerReview');
            if (toggleBtn && reviewEl) {
                toggleBtn.onclick = function() {
                    reviewVisible = !reviewVisible;
                    reviewEl.style.display = reviewVisible ? 'block' : 'none';
                    toggleBtn.textContent = reviewVisible ? '📝 Hide Full Answer Review' :
                    '📝 Show Full Answer Review';
                };
            }
        }

        function showViolation(type, logLabel, title, body) {
            if (overlay.classList.contains('show') || !inTest || locked) return;
            var n = logViolation(type, logLabel);
            warnTitle.textContent = title;
            warnBody.textContent = body;
            strikeCountEl.textContent = '⚠️ Strike ' + n + ' of ' + MAX_STRIKES;
            overlay.className = 'overlay show';
            if (n >= MAX_STRIKES) {
                resumeBtn.textContent = '⏳ Auto-submitting…';
                resumeBtn.disabled = true;
                setTimeout(function() {
                    overlay.className = 'overlay';
                    finishTest('strikes');
                }, 1400);
            }
        }

        resumeBtn.onclick = function() {
            overlay.className = 'overlay';
            var el = document.documentElement;
            var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
            if (req) req.call(el).catch(function() {});
        };

        // ============================================================
        // INIT
        // ============================================================
        function init() {
            loadSettingsFromSupabase().then(function() {
                return loadQuestionsFromSupabase();
            }).then(function(loaded) {
                if (!loaded || BANK.length === 0) {
                    BANK = FALLBACK_BANK.slice();
                    console.log('📝 Using fallback questions');
                }
                renderRegistration();
            }).catch(function(e) {
                console.error('Init error:', e);
                BANK = FALLBACK_BANK.slice();
                renderRegistration();
            });
        }

        init();
    </script>
</body>
</html>
